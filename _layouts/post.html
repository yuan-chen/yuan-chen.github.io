---
layout: default
---

<article class="single-post">
  <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  <h1 class="single-post-title">{{ page.title }}</h1>

  {% if page.image %}
    <img class="single-post-image" src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}

  <div class="single-post-content">
    {{ content }}
  </div>
</article>
