---
layout: default
---

<section class="intro-card">
  <h2>Hello, I'm Yuan Chen</h2>
  <p>
    Welcome to my personal website. I post daily updates, photos, and moments from life.
  </p>
</section>

<section class="feed">
  {% for post in site.posts %}
    <article class="post-card">
      <div class="post-card-content">
        <p class="post-date">{{ post.date | date: "%B %-d, %Y" }}</p>
        <h2 class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        {% if post.image %}
          <a href="{{ post.url }}">
            <img class="post-cover" src="{{ post.image }}" alt="{{ post.title }}">
          </a>
        {% endif %}
        <div class="post-excerpt">
          {{ post.excerpt }}
        </div>
        <p><a class="read-more" href="{{ post.url }}">Read more</a></p>
      </div>
    </article>
  {% endfor %}
</section>
